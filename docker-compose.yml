services:
  db:
    build:
      context: ./backend
      dockerfile: Dockerfile.mysql
    container_name: student-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ssm_student_db
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  backend:
    build: ./backend
    container_name: student-backend
    ports:
      - "13395:8080"
    depends_on:
      - db
    environment:
      - JDBC_URL=jdbc:mysql://db:3306/ssm_student_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai

  frontend:
    build: ./frontend
    container_name: student-frontend
    ports:
      - "33395:80"
    depends_on:
      - backend

volumes:
  db-data:
